<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>CosyHome — Guide de séjour</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <!-- Fonts 100% self-hosted (DM Sans + IvyOra) — mêmes graisses que
         l'ancien CDN Google Fonts (300/400/500/600), rendu identique ;
         supprime la requête render-blocking + le tracking Google (RGPD).
         Les @font-face sont déclarés dans src/index.css. -->
    <link rel="preload" href="/fonts/dm-sans/dm-sans-v17-latin-300.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/ivyora-display/IvyOraDisplay-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <!-- Hero login/attente (LCP) — Vite réécrit ce href vers l'asset hashé au build -->
    <link rel="preload" href="/src/assets/hero-guide.jpg" as="image" fetchpriority="high" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
